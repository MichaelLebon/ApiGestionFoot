<div class="fixed top-4  left-4 sm:left-auto z-[9999] flex flex-col gap-2 sm:w-80 max-w-sm pointer-events-none">
  @for (modal of modals(); track modal.id) {
    <div class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl shadow-lg pointer-events-auto text-sm font-medium"
         [ngClass]="{
         'bg-emerald-200 text-white': modal.type === 'success',
         'bg-red-600 text-white': modal.type === 'error',
         'bg-blue-600 text-white': modal.type === 'info',
         'bg-amber-500 text-white': modal.type === 'warning'
       }">
      <span class="flex-1 leading-snug">{{ modal.message }}</span>
      <button type="button" (click)="modalServices.dismiss(modal.id)"
              class="shrink-0 opacity-70 hover:opacity-100 transition-opacity cursor-pointer text-lg leading-none">
        ×
      </button>
    </div>
  }
</div>
