<!--
  Tableau de bord (Composant DashboardCard).
  Ce fichier gère l'affichage des statistiques globales de l'application.
-->
<div class="dashboard-header">
  <h1>Tableau de bord</h1>
  <p>Bienvenue {{ displayName() }} 👋</p>
</div>

<!-- Affichage conditionnel pendant le chargement des données -->
@if(loading){
<div>
  Chargement des statistiques...
</div>
} @else if (stats) {

<!--
  Conteneur de statistiques :
  S'affiche uniquement quand le chargement est terminé et que les données (stats) existent.
-->
  <div class="dashboard" >

  <!-- Carte statistique cliquable redirigeant vers la liste des membres -->
  <div class="stat-card clickable" (click)="goToMembers()">
    <span>👥</span>
    <h3>Membres</h3>
    <p>{{ stats.membres }}</p>
  </div>

  <!-- Cartes statistiques informatives -->
  <div class="stat-card" (click)="goToEquipes()">
    <span>⚽</span>
    <h3>Équipes</h3>
    <p>{{ stats.equipes }}</p>
  </div>

  <div class="stat-card">
    <span>📅</span>
    <h3>Matchs à venir</h3>
    <p>{{ stats.matchsAVenir }}</p>
  </div>

  <div class="stat-card">
    <span>🏆</span>
    <h3>Compétitions</h3>
    <p>{{ stats.competitions }}</p>
  </div>

</div>
}
