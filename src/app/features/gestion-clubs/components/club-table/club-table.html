<div class="table">
  <!-- En-tête -->
  <div class="row header">
    <div>Nom</div>
    <div>Local</div>
    <div>Équipes</div>
    <div>Actions</div>
  </div>
  <!-- Liste des clubs -->
  @if (clubs().length > 0) {
    @for (club of clubs(); track club.nom) {
      <div class="row">
        <div>
          <span class="bold">{{ club.nom }}</span>
        </div>
        <div>
          {{ club.local }}
        </div>
        <div>
          <span class="badge">
            {{ club.equipes.length }}
          </span>
        </div>
        <div class="actions">
          <button
            type="button"
            class="btn-detail"
            (click)="detail.emit(club)">
            👁
          </button>
          <button
            type="button"
            class="btn-delete"
            (click)="delete.emit(club)">
            🗑
          </button>
        </div>
      </div>
    }
  } @else {
    <div class="row empty-row">
      Aucun club trouvé.
    </div>
  }
</div>
