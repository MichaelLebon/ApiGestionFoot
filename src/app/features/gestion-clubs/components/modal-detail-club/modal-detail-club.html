@if (visible && club) {
  <div class="modal-overlay" (click)="fermer()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Détails du club</h2>
        <button
          type="button"
          class="close-button"
          (click)="fermer()">
          ✕
        </button>
      </div>
      <div class="modal-body">
        <div class="detail-row">
          <span class="label">Nom</span>
          <span>{{ club.nom }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Local</span>
          <span>{{ club.local }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Nombre d'équipes</span>
          <span>{{ club.equipes.length }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Équipes</span>
          @if (club.equipes.length > 0) {
            <ul>
              @for (equipe of club.equipes; track equipe) {
                <li>{{ equipe }}</li>
              }
            </ul>
          } @else {
            <span>Aucune équipe</span>
          }
        </div>
      </div>
     <div class="modal-footer">
        <button
          type="button"
          class="btn-primary"
          (click)="fermer()">
          Fermer
        </button>
      </div>
    </div>
  </div>
}
