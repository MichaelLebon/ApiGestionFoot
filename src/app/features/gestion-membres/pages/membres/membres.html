<div class="page">
  <div class="header">
    <h2>Gestion des membres</h2>
    <p class="subtitle">Administration des joueurs, rôles et équipes</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <h3>{{ filteredList().length }}</h3>
      <p>Total membres</p>
    </div>
  </div>

  <app-membres-filtres
    [(search)]="search"
    [(filterRole)]="filterRole"
    [showAddButton]="false"
  />

  <app-membres-table
    [membres]="filteredList()"
    type="affecte"
    emptyMessage="Pas de correspondance pour cette recherche."
    (detail)="openDetail($event)"
    (delete)="deleteMember($event)"
    (modalIsOpen)="openModalAssign($event)"
  />
</div>

@if (selectedMember()) {
  <app-modal-detail-membre
    [membre]="selectedMember()!"
    (close)="closeModal()"
    (manageRoles)="openModalAssign(selectedMember()!)"
    (delete)="deleteMember($event)"
    (removeFromTeam)="removeFromTeam($event)"
  />
}

@if (modalConfirmIsOpen()) {
  <app-modal-confirm
    (cancel)="closeConfirm()"
    (confirm)="confirmAction()"
    [message]="confirmMessage()">
  </app-modal-confirm>
}

@if (isModalAssignOpen()){
  <app-modal-generique
    (confirm)="manageRoles()"
    (cancel)="closeModalAssign()">
    <div class="mode-switch">
      <div class="mode-toggle">
        <button
          type="button"
          class="mode-btn add"
          [class.active]="isAddMode()"
          (click)="isAddMode() || onToggleMode()">
          ➕ Ajouter
        </button>
        <button
          type="button"
          class="mode-btn remove"
          [class.active]="!isAddMode()"
          (click)="!isAddMode() || onToggleMode()">
          ➖ Retirer
        </button>
      </div>
    </div>

    <div class="role-select">
      <label for="role">Rôle</label>
      <select
        id="role"
        [ngModel]="selectedRole()"
        (ngModelChange)="selectedRole.set($event)">
        @for (role of ROLES; track role) {
          <option [value]="role">{{ role }}</option>
        }
      </select>
    </div>
  </app-modal-generique>
}
