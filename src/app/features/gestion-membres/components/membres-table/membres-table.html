<div class="table" [class.inactive-table]="type() === 'inactif'">
  <div class="row header">
    <div>Nom</div>
    <div>Rôle</div>
    <div>Statut</div>
    <div>Actions</div>
  </div>
  @if (membres().length > 0) {
    @for (membre of membres(); track membre.id) {
      <div class="row">
        <div><span class="bold">{{ membre.prenom }} {{ membre.nom }}</span></div>
        <div><span class="badge">{{ membre.roles.join(', ') }}</span></div>
        <div>
          @if (type() === 'libre') {
            <span class="status free">LIBRE</span>
          } @else {
            <span class="status inactive">INACTIF</span>
          }
        </div>
        <div class="actions">
          <button type="button" (click)="detail.emit(membre)">👁</button>
          @if (type() === 'libre') {
            <button type="button" (click)="assign.emit(membre)">➕</button>
            <button type="button" class="danger" (click)="delete.emit(membre)">🗑</button>
          } @else {
            <button type="button" class="restore" (click)="activate.emit(membre)">♻ Réactiver</button>
          }
        </div>
      </div>
    }
  } @else {
    <div class="row empty-row">{{ emptyMessage() }}</div>
  }
</div>
